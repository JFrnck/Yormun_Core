name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # ConfigModule valida esto al bootstrapear AppModule (lint/build no
      # necesitan una conexión real: pg.Pool no conecta hasta la primera
      # query). Los tests de integración usan su propio Postgres real vía
      # testcontainers, sin relación con esta variable.
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci_not_connected
      # Mismo motivo que DATABASE_URL: ConfigModule valida solo la forma
      # (string no vacío). Nada en lint/build/e2e llama a las APIs reales
      # de Anthropic/Google — AnthropicProvider/GoogleProvider solo se
      # instancian al bootstrapear AppModule, no se invocan.
      ANTHROPIC_API_KEY: ci-not-a-real-key
      GEMINI_API_KEY: ci-not-a-real-key
      CANVAS_BASE_URL: https://canvas.ci.local
      CANVAS_API_TOKEN: ci-not-a-real-token
      TELEGRAM_BOT_TOKEN: ci-fake-token
      TELEGRAM_OWNER_CHAT_ID: 123456789
      TELEGRAM_WEBHOOK_SECRET: ci-fake-secret
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm run test:e2e
      - run: pnpm run test:integration
      - run: pnpm run build
      - run: pnpm run generate:contract
