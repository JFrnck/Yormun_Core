# No es un monorepo (AGENTS.md 4.1): este repo sigue siendo independiente,
# con su propio lockfile. pnpm 11 centraliza aquí la aprobación de scripts
# de instalación (allowBuilds) — es solo dónde vive esta configuración,
# no una decisión de arquitectura.
allowBuilds:
  # unrs-resolver: dependencia real de typescript-eslint (resolución de
  # módulos para el linter). Necesita su binario nativo.
  unrs-resolver: true
  # @swc/core: usado por unplugin-swc para los tests de Vitest (necesita
  # emitir metadata de decoradores que Nest requiere en runtime).
  '@swc/core': true
  # @scarf/scarf: telemetría de terceros (analytics de instalación de
  # paquetes npm). Sin función para el proyecto — bloqueado.
  '@scarf/scarf': false
  # Transitivos de testcontainers (integration tests con Postgres real,
  # AGENTS.md 6.2): esbuild es el bundler estándar, ssh2/cpu-features los
  # usa para exec/tunnel hacia el daemon Docker, protobufjs para su
  # protocolo con el runtime. Ninguno sospechoso, todos necesarios.
  cpu-features: true
  esbuild: true
  protobufjs: true
  ssh2: true
  # @google/genai: SDK oficial de Gemini (src/model-provider). Su
  # `prepare` script (scripts/prepare.js) referenciado en package.json no
  # existe en el tarball publicado en npm — solo corre en el repo fuente
  # del SDK, no en la instalación de un consumidor. Verificado: el
  # paquete extraído no trae carpeta `scripts/`, ni binarios nativos.
  '@google/genai': true
